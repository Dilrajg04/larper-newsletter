  <line x1="790" y1="240" x2="946" y2="200" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="790" y1="240" x2="946" y2="315" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="790" y1="320" x2="946" y2="200" stroke="#10b981" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="790" y1="320" x2="946" y2="315" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="790" y1="320" x2="946" y2="430" stroke="#10b981" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="790" y1="400" x2="946" y2="315" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="790" y1="400" x2="946" y2="430" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="790" y1="480" x2="946" y2="430" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="790" y1="480" x2="946" y2="315" stroke="#10b981" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Connections L2→L3 -->
  <line x1="974" y1="200" x2="1112" y2="255" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="974" y1="200" x2="1112" y2="375" stroke="#10b981" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="974" y1="315" x2="1112" y2="255" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="974" y1="315" x2="1112" y2="375" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="974" y1="430" x2="1112" y2="375" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="974" y1="430" x2="1112" y2="255" stroke="#10b981" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Left content -->
  <!-- Top label -->
  <text x="90" y="100" font-family="monospace" font-size="13" font-weight="700" fill="#10b981" letter-spacing="3">LARPER — ISSUE #001</text>

  <!-- Title -->
  <text x="90" y="210" font-family="sans-serif" font-size="88" font-weight="900" fill="#18181b" letter-spacing="-3">What Even</text>
  <text x="90" y="312" font-family="sans-serif" font-size="88" font-weight="900" fill="#18181b" letter-spacing="-3">Is AI?</text>

