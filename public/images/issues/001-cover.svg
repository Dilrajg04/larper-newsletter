      <stop offset="0%" style="stop-color:#f8faf9"/>
      <stop offset="100%" style="stop-color:#f0f9f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Neural-net nodes — right column decorative -->
  <!-- Layer 1 -->
  <circle cx="780" cy="160" r="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="780" cy="240" r="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="780" cy="320" r="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="780" cy="400" r="10" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="780" cy="480" r="10" fill="none" stroke="#10b981" stroke-width="2"/>

  <!-- Layer 2 -->
  <circle cx="960" cy="200" r="14" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <circle cx="960" cy="315" r="14" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <circle cx="960" cy="430" r="14" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="2"/>

  <!-- Layer 3 -->
  <circle cx="1130" cy="255" r="18" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="2.5"/>
